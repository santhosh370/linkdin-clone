<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="stylesheet" href="style.css"/>
<title>LinkedIn Feed Post</title>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <svg width="34" height="34" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <rect width="34" height="34" rx="4" fill="#0a66c2"/>
      <path d="M5 5h7v24H5zm11 9h6.5v3.3h.1c.9-1.7 3.1-3.3 6.4-3.3 6.8 0 8 4.5 8 10.3V29h-7V25c0-2.7-.05-6.1-3.7-6.1s-4.3 2.9-4.3 5.9V29H16z" fill="white"/>
      <circle cx="8.5" cy="8.5" r="3.5" fill="white"/>
    </svg>
    <div class="search-box"><span>🔍</span><input type="text" placeholder="Search"/></div>
    <div style="flex:1"></div>
    <nav style="display:flex;align-items:stretch;height:100%">
      <button class="nav-btn nav-home active" onclick="switchTab('feed',this)"><span style="font-size:18px">🏠</span><span class="lbl">Home</span></button>
      <button class="nav-btn nav-network" onclick="switchTab('network',this)"><span style="font-size:18px">👥</span><span class="lbl">My Network</span></button>
      <button class="nav-btn nav-jobs" onclick="switchTab('jobs',this)"><span style="font-size:18px">💼</span><span class="lbl">Jobs</span></button>
      <button class="nav-btn nav-notifs" onclick="switchTab('notifs',this)">
        <span style="font-size:18px;position:relative">🔔<span id="notif-badge" style="position:absolute;top:-4px;right:-6px;background:#e7301a;color:#fff;border-radius:12px;font-size:10px;font-weight:700;padding:1px 4px;line-height:1.4">2</span></span>
        <span class="lbl">Notifications</span></button>
      <button class="nav-btn nav-profile" onclick="switchTab('profile',this)"><span style="font-size:18px">👤</span><span class="lbl">Me</span></button>
    </nav>
  </div>
</div>

<div id="modal-root"></div>
<div id="main"></div>

<script src="script.js" defer></script>
</body>
</html>
